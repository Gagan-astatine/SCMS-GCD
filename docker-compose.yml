version: '3.8'
services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - FRONTEND_URL=http://localhost:3000
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./scms
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
    env_file:
      - ./scms/.env

  ml-pipeline:
    build:
      context: ./ml-pipeline
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
